# Continuous integration for SimPit.
#
# Runs the full test suite on every push and PR across the matrix of
# supported platforms and Python versions. UI tests require a display,
# so Linux jobs use Xvfb; Windows and macOS runners have a built-in
# display server already.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual runs from the Actions tab — useful when debugging.
  workflow_dispatch:

# Cancel an in-progress run for the same ref when a new commit lands.
# Saves CI minutes; the latest commit is the only one we care about.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false        # see all failures, not just the first
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Tk and Xvfb (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk xvfb

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint
        run: ruff check .

      # Non-UI test suites run on every platform identically.
      - name: Test (no UI)
        run: pytest tests/common tests/slave tests/control tests/integration

      # UI tests need a display.
      - name: Test (UI) - Linux
        if: runner.os == 'Linux'
        run: xvfb-run -a pytest tests/ui

      - name: Test (UI) - Windows / macOS
        if: runner.os != 'Linux'
        run: pytest tests/ui

  # Coverage runs once on Linux/3.12 — running it on every cell of the
  # matrix would multiply CI time without adding signal.
  coverage:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk xvfb
          pip install -e .[dev]
      - name: Run coverage
        run: |
          xvfb-run -a pytest --cov=simpit_common --cov=simpit_slave \
                              --cov=simpit_control --cov-report=xml
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage.xml
          path: coverage.xml
